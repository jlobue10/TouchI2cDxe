name: Build UEFI Driver

permissions:
  contents: read

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04@sha256:0d779ea97881505f5ef0039336ee85edba27519bdba968c284c86ee066a973c8
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout repository
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y build-essential uuid-dev iasl git nasm python3

    - name: Clone EDK2
      run: |
        git init edk2
        cd edk2
        git remote add origin https://github.com/tianocore/edk2.git
        git fetch --depth 1 origin 0f3867fa6ef0553e26c42f7d71ff6bdb98429742
        git checkout --detach FETCH_HEAD
        git submodule update --init --depth 1

    - name: Setup EDK2 environment
      run: |
        cd edk2
        export WORKSPACE=$PWD
        export PACKAGES_PATH=$WORKSPACE
        ln -sf /usr/bin/python3 /usr/bin/python
        make -C BaseTools -j$(nproc)
        source edksetup.sh

    - name: Copy sources to EDK2
      run: |
        # Keep the repo layout (src/ + tools/probe/) so the probe's relative
        # includes of ../../src/*.h resolve.
        mkdir -p edk2/MdeModulePkg/TouchI2cDxe
        cp -r src tools edk2/MdeModulePkg/TouchI2cDxe/

    - name: Add modules to build configuration
      run: |
        cd edk2
        sed -i '/\[Components\]/a \  MdeModulePkg/TouchI2cDxe/src/TouchI2cDxe.inf\n  MdeModulePkg/TouchI2cDxe/tools/probe/TouchProbe.inf' MdeModulePkg/MdeModulePkg.dsc

    - name: Build driver and probe
      run: |
        cd edk2
        export WORKSPACE=$PWD
        export PACKAGES_PATH=$WORKSPACE
        source edksetup.sh
        build -a X64 -t GCC5 -b RELEASE -p MdeModulePkg/MdeModulePkg.dsc -m MdeModulePkg/TouchI2cDxe/src/TouchI2cDxe.inf
        build -a X64 -t GCC5 -b RELEASE -p MdeModulePkg/MdeModulePkg.dsc -m MdeModulePkg/TouchI2cDxe/tools/probe/TouchProbe.inf

    - name: Prepare artifact
      run: |
        mkdir -p output
        cp edk2/Build/MdeModule/RELEASE_GCC5/X64/TouchI2cDxe.efi output/
        cp edk2/Build/MdeModule/RELEASE_GCC5/X64/TouchProbe.efi output/
        cp README.md output/

    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: TouchI2cDxe-${{ github.sha }}
        path: output/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download build artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: TouchI2cDxe-${{ github.sha }}
        path: release

    - name: Create Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
      with:
        files: release/*
        generate_release_notes: true
        draft: false
